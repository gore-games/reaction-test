<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Reaction Test</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  font-family: 'Inter', sans-serif;  
  user-select: none;
}
</style>
</head>

<body class="bg-black/90 flex items-center justify-center min-h-screen text-white">

<div class="w-full max-w-xl p-8">

  <div id="testContainer" class="bg-black/30 rounded-3xl p-8 border border-white/10 text-center">

    <h1 class="text-4xl font-bold mb-2">
      <i class="fas fa-bolt mr-2"></i>Reaction Test
    </h1>

    <p class="text-slate-400 mb-8">
      Click when the box turns green.
    </p>

    <div
      id="box"
      class="h-64 rounded-2xl bg-red-500 flex items-center justify-center text-2xl font-bold cursor-pointer transition-all duration-200"
    >
     Press the start button.
    </div>

    <button
      id="startBtn"
      class="mt-8 w-full bg-blue-600 hover:bg-blue-700 py-4 rounded-xl font-semibold text-lg transition"
    >
      Start
    </button>

    <button
      id="captureBtn"
      class="mt-4 w-full bg-green-600 hover:bg-green-700 py-3 rounded-xl font-semibold text-lg transition"
    >
      Capture Screenshot
    </button>

    <div id="result" class="mt-6 text-2xl font-bold"></div>

    <div id="copyright" class="mt-8 text-sm text-slate-400">
      &copy; 2026 Gore Games. All rights reserved.
    </div>

  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script>
const box = document.getElementById("box");
const startBtn = document.getElementById("startBtn");
const result = document.getElementById("result");

let highScore = localStorage.getItem("reactionHighScore");

if (!highScore) {
  highScore = null;
}

let startTime;
let waiting = false;
let ready = false;
let timer;

updateHighScore();

startBtn.addEventListener("click", startGame);

function startGame() {

  clearTimeout(timer);

  waiting = true;
  ready = false;

  result.innerHTML = "";

  box.className =
    "h-64 rounded-2xl bg-red-500 flex items-center justify-center text-2xl font-bold cursor-pointer transition-all duration-200";

  box.textContent = "Wait...";

  const delay = Math.random() * 4000 + 1500;

  timer = setTimeout(() => {

    waiting = false;
    ready = true;

    startTime = Date.now();

    box.classList.remove("bg-red-500");
    box.classList.add("bg-green-500");

    box.textContent = "CLICK NOW!";

  }, delay);
}

box.addEventListener("click", () => {

  // Too early
  if (waiting) {

    clearTimeout(timer);

    waiting = false;

    result.innerHTML =
      `<div class="text-red-400 font-bold">
        You clicked too early!
      </div>`;

    box.textContent = "Too soon!";

    return;
  }

  if (ready) {

    ready = false;

    const reaction = Date.now() - startTime;

    let rank = getRank(reaction);

    if (!highScore || reaction < highScore) {

      highScore = reaction;

      localStorage.setItem(
        "reactionHighScore",
        reaction
      );
    }

    updateHighScore();

    result.innerHTML = `
      <div class="space-y-2">

        <div class="text-3xl">
          ${reaction} ms
        </div>

        <div class="text-xl font-bold bg-black/10 px-4 py-2 rounded border border-white/10">
          ${rank}
        </div>

      </div>
    `;

    box.classList.remove("bg-green-500");
    box.classList.add("bg-blue-600");

    box.textContent = "Finished";
  }
});

function getRank(ms) {

  if (ms < 100)
    return "🤖 Robot";

  if (ms < 180)
    return "👑 Godlike";

  if (ms < 250)
    return "🚀 Insane";

  if (ms < 300)
    return "🔥 Fast";

  if (ms < 400)
    return "👍 Good";

  if (ms < 500)
    return "🙂 Average";

  return "🐢 Slow";
}

function updateHighScore() {

  const existing = document.getElementById("highscore");

  if (existing) {
    existing.remove();
  }

  const score = document.createElement("div");

  score.id = "highscore";

  score.className =
    "mt-4 text-lg text-yellow-400 font-bold";

  score.textContent =
    highScore
      ? `🏆 Best: ${highScore} ms`
      : "🏆 Best: None";

  result.parentNode.insertBefore(
    score,
    result
  );
}

const captureBtn = document.getElementById("captureBtn");
const testContainer = document.getElementById("testContainer");

if (captureBtn) {
  captureBtn.addEventListener("click", async () => {
    try {
      captureBtn.disabled = true;
      const originalText = captureBtn.textContent;

      captureBtn.classList.add("invisible");

      const canvas = await html2canvas(testContainer, {
        scale: window.devicePixelRatio || 1,
        useCORS: true,
        backgroundColor: null
      });

      const dataUrl = canvas.toDataURL("image/png");

      captureBtn.classList.remove("invisible");
      captureBtn.textContent = originalText;
      captureBtn.disabled = false;

      const link = document.createElement("a");
      link.href = dataUrl;
      link.download = "reaction-test.png";
      document.body.appendChild(link);
      link.click();
      link.remove();

    } catch (err) {
      console.error(err);
      captureBtn.classList.remove("invisible");
      captureBtn.disabled = false;
      captureBtn.textContent = "Capture Screenshot";
      alert("Failed to capture screenshot.");
    }
  });
}
</script>

</body>
</html>
